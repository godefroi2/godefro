<html>
<head>
    <title>Godefroi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
       
     body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border-top: 8px solid #ff9f43;
            transition: transform 0.3s ease;
        }
        .badge {
            background: #ff9e43ce;
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1e3c72;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .footer-text {
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="badge">Its Me</span>
        <h1>Godefroi BUCYEYENEZA</h1>
        <div class="footer-text">
            © 2026 Created for Godefroi from GS mwendo tss
        </div>
    </div>

</body>
</html>
